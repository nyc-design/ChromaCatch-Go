; PlatformIO Project Configuration
; ChromaCatch-Go ESP32 BLE HID Mouse + WiFi HTTP Command Server

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    ESP32 BLE Arduino
    ArduinoJson@^7.0.0
    ESPAsyncWebServer
    AsyncTCP
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BLUEDROID_ENABLED=1
