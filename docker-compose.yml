services:
  location-backend:
    build:
      context: ./services/location_backend
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./services/shared
    container_name: chromacatch-location
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - CC_LOCATION_API_KEY=${CC_LOCATION_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  sniper-service:
    build:
      context: ./services/sniper_service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./services/shared
    container_name: chromacatch-sniper
    restart: unless-stopped
    depends_on:
      location-backend:
        condition: service_healthy
    ports:
      - "8010:8010"
    environment:
      - CC_SNIPER_DISCORD_TOKEN=${CC_SNIPER_DISCORD_TOKEN:-}
      - CC_SNIPER_LOCATION_POST_URL=${CC_SNIPER_LOCATION_POST_URL:-http://location-backend:8001/location}
      - CC_SNIPER_LOCATION_CLIENT_ID=${CC_SNIPER_LOCATION_CLIENT_ID:-ios-app}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
